<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>PREMIUM MOVIE ZONE</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

  <style>
    :root { 
      --primary-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
      --card-bg: #ffffff; 
      --bg-color: #f0f2f5; 
      --text-dark: #2d3436; 
      --text-light: #636e72; 
      --accent-color: #e84393; 
    }
    * {box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;}
    body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; background: var(--bg-color); min-height: 100vh; color: var(--text-dark); }
    
    .header { text-align: center; margin-bottom: 25px; padding: 20px 15px; background: var(--primary-gradient); color: white; box-shadow: 0 4px 15px rgba(30, 60, 114, 0.2); border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; display: flex; justify-content: center; align-items: center; }
    
    .glowing-title-btn { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #2d3436; background: #fdcb6e; border: none; border-radius: 30px; padding: 12px 30px; display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; box-shadow: 0 0 15px rgba(253, 203, 110, 0.7); position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.3s; animation: glowPulse 2s infinite; }
    .glowing-title-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(253, 203, 110, 0.9); }
    .glowing-title-btn i { font-size: 20px; color: #2d3436; }

    @keyframes glowPulse { 0% { box-shadow: 0 0 10px rgba(253, 203, 110, 0.6); } 50% { box-shadow: 0 0 25px rgba(253, 203, 110, 0.9); } 100% { box-shadow: 0 0 10px rgba(253, 203, 110, 0.6); } }
    
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr)); gap: 20px; max-width: 1280px; margin: 0 auto; padding: 0 15px 50px 15px; }
    
    .video-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; box-shadow: 0 8px 20px -5px rgba(0, 0, 0, 0.08); transition: all 0.3s; position: relative; border: 1px solid rgba(255,255,255,0.8); }
    .video-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.12); }
    
    .thumbnail { position: relative; width: 100%; padding-top: 56.25%; overflow: hidden; background: #000; cursor: pointer; border-radius: 16px 16px 0 0; }
    .thumbnail img.static-thumb { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; filter: brightness(0.85); }
    .video-card:hover .thumbnail img.static-thumb { transform: scale(1.05); }
    
    .play-btn-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(4px); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255, 255, 255, 0.4); transition: all 0.3s ease; z-index: 2; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .play-btn-wrapper i { color: white; font-size: 22px; margin-left: 4px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .video-card:hover .play-btn-wrapper { background: var(--accent-color); transform: translate(-50%, -50%) scale(1.1); border-color: var(--accent-color); }
    
    .duration-badge { position: absolute; bottom: 10px; right: 10px; background: rgba(0, 0, 0, 0.8); color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; backdrop-filter: blur(2px); z-index: 3; }
    
    .video-info { padding: 12px 15px; } 
    .video-title { font-size: 15px; font-weight: 600; line-height: 1.3; color: var(--text-dark); margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 39px; }
    
    .meta-tags { display: flex; justify-content: space-between; align-items: center; }
    .meta-pill { display: flex; align-items: center; gap: 6px; background: #f1f3f5; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--text-light); box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
    .meta-pill i { color: #2a5298; font-size: 11px; }
    .upload-time { font-size: 12px; color: #95a5a6; font-weight: 500; display: flex; align-items: center; gap: 4px; }
    
    .spinner { width: 45px; height: 45px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #1e3c72; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    /* --- পপআপ স্টাইল --- */
    .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); z-index: 1000; display: none; opacity: 0; transition: opacity 0.3s; }
    .popup-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 90%; max-width: 380px; background: white; border-radius: 20px; padding: 30px 25px; text-align: center; z-index: 1001; display: none; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); opacity: 0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .popup-icon { width: 60px; height: 60px; background: #e3f2fd; color: #1e3c72; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 15px; }
    .popup-box h3 { font-size: 18px; color: var(--text-dark); margin-bottom: 8px; font-weight: 700; }
    .popup-box p { font-size: 13px; color: var(--text-light); margin-bottom: 25px; line-height: 1.5; }
    .popup-actions { display: flex; flex-direction: column; gap: 10px; }
    
    .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:active { transform: scale(0.98); }
    .btn-ad { background: var(--primary-gradient); color: white; box-shadow: 0 4px 15px rgba(30, 60, 114, 0.4); }
    .btn-cancel { background: #fff; color: #ff7675; margin-top: 5px; font-size: 13px; }
    
    .show-popup .popup-overlay { display: block; opacity: 1; }
    .show-popup .popup-box { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
  </style>
</head>
<body>

<div class="header">
    <button class="glowing-title-btn">
        <i class="fas fa-bolt"></i> Premium Movie Zone
    </button>
</div>

<div class="video-grid" id="mainGrid">
  <div style="text-align:center; grid-column:1/-1; padding:50px;">
    <div class="spinner"></div>
    <p style="margin-top:15px; color:#636e72;">ভিডিও লোড হচ্ছে...</p>
  </div>
</div>

<div id="popupContainer">
    <div class="popup-overlay" onclick="closePopup()"></div>
    <div class="popup-box">
        <div class="popup-icon"><i class="fas fa-video"></i></div>
        <h3>প্রিমিয়াম ভিডিও আনলক করুন</h3>
        <p>সম্পূর্ণ মুভিটি প্লে করার জন্য একটি ছোট ভিডিও বিজ্ঞাপন দেখুন। বিজ্ঞাপন শেষ হলেই মুভি শুরু হবে।</p>
        <div class="popup-actions">
            <button class="btn btn-ad" id="adButton" onclick="watchAdAndPlay()"><i class="fas fa-play"></i> ভিডিও অ্যাড দেখুন</button>
            <button class="btn btn-cancel" onclick="closePopup()">এখন না</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const firebaseConfig = {
    apiKey: "AIzaSyBlRY15dg5BAsgWgLf7u2liQs4pFngZxz4",
    authDomain: "newtaskbot.firebaseapp.com",
    databaseURL: "https://newtaskbot-default-rtdb.firebaseio.com",
    projectId: "newtaskbot",
    storageBucket: "newtaskbot.firebasestorage.app",
    messagingSenderId: "367409983642",
    appId: "1:367409983642:web:1d46dc2e03b892aca8af23"
  };

  try {
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    let AdController = null;
    let currentMegaCloudLink = ""; 
    let currentAdLimit = 1; 
    let adsWatched = 0; 
    let currentActiveCardId = null;

    db.ref('siteConfig').on('value', (snap) => {
        const config = snap.val();
        if(config) {
            if(config.adsgramId && window.Adsgram) {
                const cleanId = String(config.adsgramId).trim();
                AdController = window.Adsgram.init({ blockId: cleanId });
            }
            if(config.adLimit) {
                currentAdLimit = parseInt(config.adLimit);
            }
            if(config.headScripts) {
                const existingContainer = document.getElementById('adsterra-script-container');
                if(existingContainer) existingContainer.remove();
                const scriptContainer = document.createElement('div');
                scriptContainer.id = 'adsterra-script-container';
                document.body.appendChild(scriptContainer);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = config.headScripts;
                const scripts = tempDiv.getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    const newScript = document.createElement('script');
                    if (scripts[i].src) newScript.src = scripts[i].src; 
                    else newScript.innerHTML = scripts[i].innerHTML; 
                    scriptContainer.appendChild(newScript);
                }
            }
        }
    });

    function loadVideosSafe() {
        db.ref('videos').orderByChild('timestamp').once('value')
        .then((snapshot) => {
            const grid = document.getElementById('mainGrid');
            if(snapshot.exists()){
                let videoList = [];
                snapshot.forEach(c => {
                    const val = c.val();
                    if(val && val.title) {
                        val.key = c.key;
                        videoList.push(val);
                    }
                });
                videoList.reverse();

                if(videoList.length === 0) {
                     grid.innerHTML = "<p style='text-align:center; grid-column:1/-1; padding:20px;'>কোনো মুভি পাওয়া যায়নি।</p>";
                     return;
                }

                let html = "";
                videoList.forEach((v) => {
                    const megaCloudLink = v.megaLink || "#"; 
                    
                    html += `
                    <div class="video-card">
                      <div class="thumbnail" id="thumb-${v.key}" onclick="playVideo('${v.key}', '${megaCloudLink}')">
                        <img class="static-thumb" src="${v.thumbnail}" loading="lazy" alt="thumb" onerror="this.src='https://via.placeholder.com/320x180?text=No+Image'">
                        <div class="play-btn-wrapper"><i class="fas fa-play"></i></div>
                        <div class="duration-badge">${v.duration || '0:00'}</div>
                      </div>
                      <div class="video-info">
                        <h3 class="video-title">${v.title}</h3>
                        <div class="meta-tags">
                            <div class="meta-pill"><i class="fas fa-eye"></i> ${v.views || '0'}</div>
                            <div class="upload-time"><i class="far fa-clock"></i> ${v.time || 'New'}</div>
                        </div>
                      </div>
                    </div>`;
                });
                grid.innerHTML = html;
            } else {
                grid.innerHTML = "<p style='text-align:center; grid-column:1/-1; padding:20px;'>ডাটাবেস খালি।</p>";
            }
        });
    }

    loadVideosSafe();

    window.playVideo = function(cardKey, megaLink) {
        currentActiveCardId = "thumb-" + cardKey;
        currentMegaCloudLink = megaLink;
        adsWatched = 0; 
        
        const btn = document.getElementById('adButton');
        btn.innerHTML = `<i class="fas fa-play"></i> ভিডিও অ্যাড দেখুন`;
        document.getElementById('popupContainer').classList.add('show-popup');
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    };

    window.closePopup = function() {
        document.getElementById('popupContainer').classList.remove('show-popup');
    };

    // 🔥 Viral Zone BD এর হুবহু লজিক: কার্ডের ভেতরে ভিডিও ప్লে করা 🔥
    window.unlockVideoInline = function() {
        const container = document.getElementById(currentActiveCardId);
        if (!container) return;
        
        // ক্লিক বন্ধ করা হলো
        container.onclick = null;
        
        let finalUrl = currentMegaCloudLink;
        
        // মেগার রেগুলার লিংক হলে অটোমেটিক embed লিংকে কনভার্ট করবে
        if (finalUrl.includes('mega.nz/file/')) {
            finalUrl = finalUrl.replace('mega.nz/file/', 'mega.nz/embed/');
        }

        // লিংকের ধরন চেক (mp4 নাকি iframe)
        let isDirectVideo = finalUrl.match(/\.(mp4|webm|mkv|ogg)/i);
        
        if (isDirectVideo) {
            container.innerHTML = `<video src="${finalUrl}" controls autoplay playsinline style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; background: #000; z-index: 10;"></video>`;
        } else {
            container.innerHTML = `<iframe src="${finalUrl}" frameborder="0" allowfullscreen="true" allow="autoplay; fullscreen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10;"></iframe>`;
        }
    };

    window.watchAdAndPlay = function() {
        const btn = document.getElementById('adButton');
        
        if (!AdController) {
            alert("বর্তমানে কোনো বিজ্ঞাপন উপলব্ধ নেই। অ্যাডমিন প্যানেল থেকে Adsgram ID সেট করুন।");
            return;
        }

        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> অ্যাড লোড হচ্ছে...';
        btn.disabled = true;

        AdController.show()
            .then((result) => {
                adsWatched++;
                
                if(adsWatched >= currentAdLimit) {
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    closePopup();
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    
                    if(currentMegaCloudLink && currentMegaCloudLink !== "#") {
                        // অ্যাড দেখা শেষ হলে কার্ডের ভেতরে ভিডিও আনলক
                        unlockVideoInline();
                    } else {
                        alert("এই ভিডিওটির লিংক পাওয়া যায়নি!");
                    }
                } else {
                    btn.innerHTML = `<i class="fas fa-play"></i> আরও ${currentAdLimit - adsWatched}টি অ্যাড দেখুন`;
                    btn.disabled = false;
                    if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                    alert(`আপনাকে আরও ${currentAdLimit - adsWatched}টি অ্যাড দেখতে হবে।`);
                }
            })
            .catch((result) => {
                alert("ভিডিও প্লে করতে হলে সম্পূর্ণ বিজ্ঞাপনটি দেখতে হবে!");
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
    };

  } catch (error) {
      console.error("Main Script Error: ", error.message);
  }
</script>
</body>
</html>
