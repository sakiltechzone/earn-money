<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viral Zone BD</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-color: #ff4757;
            --brand-gradient: linear-gradient(135deg, #ff6b81, #ff4757);
            --movie-gradient: linear-gradient(135deg, #fbc531, #e1b12c);
            --bg-color: var(--tg-theme-bg-color, #121212);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: var(--tg-theme-text-color, #ffffff);
            --text-muted: var(--tg-theme-hint-color, #a4b0be);
        }

        body { font-family: 'Hind Siliguri', 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px 15px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; text-align: center; overflow-y: auto; }

        .brand-header h1 { font-family: 'Poppins', sans-serif; font-size: 26px; font-weight: 700; margin: 0 0 20px 0; background: var(--brand-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .card { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; width: 100%; max-width: 380px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-bottom: 25px; box-sizing: border-box; }
        
        .card-header { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .movie-title { color: #fbc531; }
        .viral-title { color: #ff4757; }

        .thumbnail-container { position: relative; width: 100%; height: 200px; border-radius: 14px; overflow: hidden; background: #000; margin-bottom: 15px; cursor: pointer; }
        
        .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); transition: all 0.3s ease; }

        .lock-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 45px; animation: pulseLock 2s infinite; pointer-events: none; }
        .movie-lock { color: #fbc531; }
        .viral-lock { color: #ff4757; }

        .gif-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #fff; font-size: 12px; padding: 5px 10px; border-radius: 4px; border: 1px solid var(--brand-color); display: none; font-weight: 600; pointer-events: none; }

        h2 { margin: 0 0 5px 0; font-size: 16px; line-height: 1.4; height: 45px; overflow: hidden; text-align: left; }
        
        .progress-container { background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 12px; margin-bottom: 20px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
        .progress-header span.highlight { color: #2ed573; font-weight: 700; }
        .progress-bar-bg { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2ed573, #7bed9f); border-radius: 10px; transition: width 0.3s; }

        .btn-group { display: flex; gap: 8px; width: 100%; }
        .btn { padding: 12px 5px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: inherit; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        
        .btn-nav { flex: 1; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #dfe4ea; }
        .btn-nav:active { background: rgba(255, 255, 255, 0.2); transform: scale(0.97); }
        
        .btn-ad { flex: 2; background: linear-gradient(135deg, #3742fa, #5352ed); box-shadow: 0 4px 15px rgba(55, 66, 250, 0.4); font-size: 14px;}
        .btn-ad:active { transform: scale(0.97); }
        .btn-ad:disabled { background: #57606f; box-shadow: none; cursor: not-allowed; }

        .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #ff4757; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulseLock { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.15); } 100% { transform: translate(-50%, -50%) scale(1); } }
        
        @keyframes fadeInUI { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .fade-in { animation: fadeInUI 0.3s ease-in-out; }
    </style>
</head>
<body>

    <div class="brand-header">
        <h1>Viral Zone BD <i class="fas fa-fire" style="color:#ff4757;"></i></h1>
    </div>

    <div id="loadingDiv" style="text-align:center; padding: 50px;">
        <div class="loader"></div>
        <p style="margin-top:15px; color:#a4b0be; font-size:14px;">ডেটা লোড হচ্ছে...</p>
    </div>

    <div class="card" id="movieCard" style="display: none;">
        <div class="card-header movie-title"><i class="fas fa-film"></i> Movie Zone</div>
        
        <div class="thumbnail-container" id="movieThumbContainer" onclick="playGifPreview('movie')">
            <img src="" alt="Thumbnail" id="movieThumb">
            <i class="fas fa-lock lock-icon movie-lock"></i>
            <div id="movieGifBadge" class="gif-badge"><i class="fas fa-play" style="font-size: 10px;"></i> Play</div>
        </div>
        
        <h2 id="movieTitle">লোড হচ্ছে...</h2>
        
        <div class="progress-container">
            <div class="progress-header">
                <span>আনলক স্ট্যাটাস</span>
                <span class="highlight"><span id="movieAdsWatched">0</span>/<span class="totalAdsNeeded">3</span> সম্পন্ন</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="movieProgressFill"></div>
            </div>
        </div>

        <div class="btn-group" id="movieBtnGroup">
            <button class="btn btn-nav" onclick="prevVideo('movie')"><i class="fas fa-backward"></i> Prev</button>
            <button class="btn btn-nav" onclick="nextVideo('movie')">Next <i class="fas fa-forward"></i></button>
            <button class="btn btn-ad" id="movieAdBtn" onclick="handleAdClick('movie')"><i class="fas fa-play-circle"></i> অ্যাড দেখুন</button>
        </div>
    </div>

    <div class="card" id="viralCard" style="display: none;">
        <div class="card-header viral-title"><i class="fas fa-fire-alt"></i> Viral Zone</div>

        <div class="thumbnail-container" id="viralThumbContainer" onclick="playGifPreview('viral')">
            <img src="" alt="Thumbnail" id="viralThumb">
            <i class="fas fa-lock lock-icon viral-lock"></i>
            <div id="viralGifBadge" class="gif-badge"><i class="fas fa-play" style="font-size: 10px;"></i> Play</div>
        </div>
        
        <h2 id="viralTitle">লোড হচ্ছে...</h2>
        
        <div class="progress-container">
            <div class="progress-header">
                <span>আনলক স্ট্যাটাস</span>
                <span class="highlight"><span id="viralAdsWatched">0</span>/<span class="totalAdsNeeded">3</span> সম্পন্ন</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="viralProgressFill"></div>
            </div>
        </div>

        <div class="btn-group" id="viralBtnGroup">
            <button class="btn btn-nav" onclick="prevVideo('viral')"><i class="fas fa-backward"></i> Prev</button>
            <button class="btn btn-nav" onclick="nextVideo('viral')">Next <i class="fas fa-forward"></i></button>
            <button class="btn btn-ad" id="viralAdBtn" onclick="handleAdClick('viral')"><i class="fas fa-play-circle"></i> অ্যাড দেখুন</button>
        </div>
    </div>


    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAl0eRqOs5QNUg_J1Pj-4PlEqRDxAXr-oA",
            authDomain: "viral-zone-bd.firebaseapp.com",
            databaseURL: "https://viral-zone-bd-default-rtdb.firebaseio.com",
            projectId: "viral-zone-bd",
            storageBucket: "viral-zone-bd.firebasestorage.app",
            messagingSenderId: "794737483555",
            appId: "1:794737483555:web:a275cd96aafff0e640f696"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let adsController = null;
        let requiredAdsCount = 3;

        const state = {
            movie: { list: [], index: 0, adsWatched: 0, dbNode: 'movie_videos' },
            viral: { list: [], index: 0, adsWatched: 0, dbNode: 'bot_videos' }
        };
        
        function safeHaptic(style = 'light') {
            try {
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback && typeof window.Telegram.WebApp.HapticFeedback.impactOccurred === 'function') {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred(style);
                }
            } catch(e) {}
        }

        fetchData();

        function fetchData() {
            db.ref('siteConfig').on('value', snap => {
                if(snap.val()) {
                    const config = snap.val();
                    requiredAdsCount = parseInt(config.requiredAds) || 3;
                    
                    document.querySelectorAll('.totalAdsNeeded').forEach(el => el.innerText = requiredAdsCount);

                    if(config.adsgramId && !adsController) {
                        try { adsController = window.Adsgram.init({ blockId: String(config.adsgramId).trim() }); } 
                        catch(e) { console.error("Adsgram Error", e); }
                    }
                    updateProgress('movie');
                    updateProgress('viral');
                }
            });

            db.ref(state.movie.dbNode).orderByChild('timestamp').on('value', snap => {
                let temp = [];
                snap.forEach(child => { temp.push(child.val()); });
                state.movie.list = temp.reverse(); 
                
                if(state.movie.list.length > 0) {
                    if(state.movie.index >= state.movie.list.length) state.movie.index = 0;
                    document.getElementById('movieCard').style.display = 'block';
                    updateUI('movie');
                } else {
                    document.getElementById('movieCard').style.display = 'none';
                }
                checkLoadingState();
            });

            db.ref(state.viral.dbNode).orderByChild('timestamp').on('value', snap => {
                let temp = [];
                snap.forEach(child => { temp.push(child.val()); });
                state.viral.list = temp.reverse(); 
                
                if(state.viral.list.length > 0) {
                    if(state.viral.index >= state.viral.list.length) state.viral.index = 0;
                    document.getElementById('viralCard').style.display = 'block';
                    updateUI('viral');
                } else {
                    document.getElementById('viralCard').style.display = 'none';
                }
                checkLoadingState();
            });
        }

        function checkLoadingState() {
            document.getElementById('loadingDiv').style.display = 'none';
        }

        function updateUI(type) {
            try {
                const data = state[type];
                if(data.list.length === 0) return;
                const currentVideo = data.list[data.index];
                
                document.getElementById(`${type}Title`).innerText = currentVideo.title || "Untitled";
                
                const container = document.getElementById(`${type}ThumbContainer`);
                container.classList.remove('fade-in');
                void container.offsetWidth; 
                container.classList.add('fade-in');

                // থাম্বনেইল অংশ রিস্টোর করা হচ্ছে
                container.innerHTML = `
                    <img src="${currentVideo.thumb || currentVideo.thumbnail}" alt="Thumbnail" id="${type}Thumb" style="width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); transition: all 0.3s ease;">
                    <i class="fas fa-lock lock-icon ${type}-lock"></i>
                    <div id="${type}GifBadge" class="gif-badge" style="display: ${currentVideo.gif ? 'block' : 'none'};"><i class="fas fa-play" style="font-size: 10px;"></i> Play</div>
                `;
                container.onclick = () => playGifPreview(type);
                
                data.adsWatched = 0;
                
                // বাটন অংশ রিস্টোর করা হচ্ছে
                const btnGroup = document.getElementById(`${type}BtnGroup`);
                btnGroup.innerHTML = `
                    <button class="btn btn-nav" onclick="prevVideo('${type}')"><i class="fas fa-backward"></i> Prev</button>
                    <button class="btn btn-nav" onclick="nextVideo('${type}')">Next <i class="fas fa-forward"></i></button>
                    <button class="btn btn-ad" id="${type}AdBtn" onclick="handleAdClick('${type}')"><i class="fas fa-play-circle"></i> অ্যাড (${data.adsWatched}/${requiredAdsCount})</button>
                `;
                
                updateProgress(type);
            } catch(e) {}
        }

        function playGifPreview(type) {
            const currentVideo = state[type].list[state[type].index];
            if(currentVideo.gif) {
                const imgElement = document.getElementById(`${type}Thumb`);
                const badgeElement = document.getElementById(`${type}GifBadge`);
                if(imgElement) {
                    imgElement.src = currentVideo.gif;
                    imgElement.style.filter = "brightness(1)";
                }
                if(badgeElement) badgeElement.style.display = "none"; 
                safeHaptic('light');
            }
        }

        function updateProgress(type) {
            document.getElementById(`${type}AdsWatched`).innerText = state[type].adsWatched;
            const percentage = (state[type].adsWatched / requiredAdsCount) * 100;
            document.getElementById(`${type}ProgressFill`).style.width = (percentage || 0) + '%';
        }

        function nextVideo(type) {
            const data = state[type];
            if (data.list.length <= 1) { safeHaptic('error'); return; }
            data.index++;
            if(data.index >= data.list.length) data.index = 0; 
            updateUI(type);
            safeHaptic('light');
        }

        function prevVideo(type) {
            const data = state[type];
            if (data.list.length <= 1) { safeHaptic('error'); return; }
            data.index--;
            if(data.index < 0) data.index = data.list.length - 1; 
            updateUI(type);
            safeHaptic('light');
        }

        // 🔥 এক্সটার্নাল লিংকে রিডাইরেক্ট লজিক (সরাসরি ভিডিও পেজে নিয়ে যাবে) 🔥
        function unlockVideoInline(type) {
            const currentVideo = state[type].list[state[type].index];
            const container = document.getElementById(`${type}ThumbContainer`);
            const btnGroup = document.getElementById(`${type}BtnGroup`);
            
            // আসল লিংক সংগ্রহ
            let videoLink = (currentVideo.link || currentVideo.megaLink || "").trim();

            // ⚠️ মেগা ড্রাইভ ফিক্স ⚠️ 
            // যদি লিংকে embed থাকে, তাহলে সেটাকে file এ কনভার্ট করা হচ্ছে। 
            // এতে মেগা অ্যাপ হোম পেজে না গিয়ে সরাসরি ভিডিও পেজে (Open option) নিয়ে যাবে।
            if (videoLink.includes('mega.nz/embed/')) {
                videoLink = videoLink.replace('mega.nz/embed/', 'mega.nz/file/');
            } else if (videoLink.includes('mega.co.nz/embed/')) {
                videoLink = videoLink.replace('mega.co.nz/embed/', 'mega.co.nz/file/');
            }

            // <a> ট্যাগ দিয়ে লিংক করা হচ্ছে যাতে টেলিগ্রামের ভেতর আটকে না থেকে ডিরেক্ট অ্যাপ/ব্রাউজারে ওপেন হয়
            container.innerHTML = `
                <a href="${videoLink}" target="_blank" style="display:block; width:100%; height:100%; position:relative; text-decoration:none;">
                    <img src="${currentVideo.thumb || currentVideo.thumbnail}" alt="Thumbnail" style="width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6);">
                    <i class="fas fa-play-circle" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; color: #2ed573; text-shadow: 0 0 20px rgba(46, 213, 115, 0.6);"></i>
                </a>
            `;

            // নিচের বাটনগুলো সরিয়ে শুধু একটি বড় "ভিডিও দেখুন" বাটন দেওয়া হচ্ছে, যেটাতে ক্লিক করলেও রিডাইরেক্ট হবে
            btnGroup.innerHTML = `
                <a href="${videoLink}" target="_blank" class="btn btn-ad" style="flex: 1; background: linear-gradient(135deg, #2ed573, #2bad60); text-decoration: none; font-size: 15px; box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);"><i class="fas fa-external-link-alt"></i> ভিডিও দেখুন</a>
            `;
        }

        function handleAdClick(type) {
            if(state[type].adsWatched >= requiredAdsCount) return;
            
            const btn = document.getElementById(`${type}AdBtn`);
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> লোড হচ্ছে...';

            if (adsController) {
                adsController.show().then((result) => {
                    state[type].adsWatched++;
                    updateProgress(type);
                    
                    if (state[type].adsWatched >= requiredAdsCount) {
                        safeHaptic('success');
                        setTimeout(() => { unlockVideoInline(type); }, 300);
                    } else {
                        btn.disabled = false;
                        btn.innerHTML = `<i class="fas fa-play-circle"></i> অ্যাড (${state[type].adsWatched}/${requiredAdsCount})`;
                        safeHaptic('medium');
                    }
                }).catch((result) => {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-play-circle"></i> অ্যাড (${state[type].adsWatched}/${requiredAdsCount})`;
                    tg.showAlert("⚠️ আপনি অ্যাডটি সম্পূর্ণ দেখেননি বা লোড হয়নি। আবার চেষ্টা করুন।");
                });
            } else {
                tg.showAlert("বিজ্ঞাপন সিস্টেম লোড হয়নি!");
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-play-circle"></i> অ্যাড (${state[type].adsWatched}/${requiredAdsCount})`;
            }
        }
    </script>
</body>
</html>
