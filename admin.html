<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল | Viral Zone BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Hind Siliguri', 'Poppins', sans-serif; background: #eef2f5; padding: 20px; margin: 0; color: #333; }
        .container { max-width: 850px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #2c3e50; font-size: 28px; margin: 0; }
        .header p { color: #7f8c8d; margin-top: 5px; font-weight: 600; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 4px solid; }
        .card-settings { border-top-color: #3742fa; } 
        .card-viral { border-top-color: #ff4757; }
        
        h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        
        label { font-weight: 600; font-size: 14px; color: #555; display: block; margin-top: 15px; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; font-family: inherit; transition: 0.3s; font-size: 14px;}
        input:focus, textarea:focus { outline: none; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        .input-viral:focus { border-color: #ff4757; }
        textarea { resize: vertical; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: 600; font-family: inherit; transition: 0.3s; flex: 1; font-size: 15px; }
        
        .btn-settings { background: #3742fa; } .btn-settings:hover { background: #2f3640; }
        .btn-viral { background: #ff4757; } .btn-viral:hover { background: #ff3344; }
        .btn-cancel { background: #95a5a6; display: none; } .btn-cancel:hover { background: #7f8c8d; }
        
        .video-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 15px 0; gap: 10px; }
        .video-item:last-child { border-bottom: none; }
        .video-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .video-info img { width: 70px; height: 45px; object-fit: cover; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-shrink: 0; }
        .video-details { flex: 1; min-width: 0; }
        .video-details h4 { margin: 0 0 5px 0; font-size: 14px; color: #2f3640; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-details p { margin: 0; font-size: 12px; color: #7f8c8d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .action-btns { display: flex; gap: 8px; flex-shrink: 0; }
        .action-btns button { padding: 8px 12px; font-size: 13px; flex: none; border-radius: 6px; color: white; }
        .btn-edit { background: #ffa502; } .btn-edit:hover { background: #e59400; }
        .btn-delete { background: #e74c3c; } .btn-delete:hover { background: #c0392b; }

        .video-count { padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: normal; color: white; }
        .count-viral { background: #ff4757; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Admin Panel <i class="fas fa-tools" style="color: #3742fa;"></i></h1>
        <p>Viral Zone BD</p>
    </div>

    <div class="card card-settings">
        <h3><i class="fas fa-cog" style="color: #3742fa;"></i> গ্লোবাল সেটিংস</h3>
        
        <label>Adsgram Block ID:</label>
        <input type="text" id="setAdsgramId" placeholder="আপনার Adsgram ID দিন...">
        
        <label>ভিডিও আনলক করতে ইউজারকে কয়টি অ্যাড দেখতে হবে?</label>
        <input type="number" id="setRequiredAds" placeholder="যেমন: 3" value="3">

        <label>স্ক্রোলিং নোটিশ টেক্সট (ফাঁকা রাখলে ইউজার প্যানেলে নোটিশ হাইড হয়ে যাবে)</label>
        <input type="text" id="setNoticeText" placeholder="যেমন: নতুন ভিডিও আপলোড করা হয়েছে, সবাই দেখে নিন!">

        <label>ব্যানার অ্যাড স্ক্রিপ্ট (Adsterra 320x50 HTML Code - ফাঁকা রাখলে অ্যাড বন্ধ থাকবে)</label>
        <textarea id="setBannerScript" rows="4" placeholder="<script>...</script> কোডটি এখানে পেস্ট করুন..."></textarea>
        
        <div class="btn-group">
            <button class="btn-settings" onclick="saveAdSettings()"><i class="fas fa-save"></i> সেটিংস সেভ করুন</button>
        </div>
    </div>

    <div class="card card-viral">
        <h3 id="formTitleViral"><span style="color:#ff4757;"><i class="fas fa-fire-alt"></i> ভাইরাল ভিডিও আপলোড</span></h3>
        <input type="hidden" id="editKeyViral">
        
        <label>ভিডিওর টাইটেল</label>
        <input type="text" class="input-viral" id="vTitle" placeholder="যেমন: ভাইরাল স্ক্যান্ডাল ভিডিও পার্ট ১ 🔞">
        
        <label>থাম্বনেইল লিংক (ছবির লিংক)</label>
        <input type="text" class="input-viral" id="vThumb" placeholder="ছবির লিংক দিন">

        <label>GIF লিংক (হোভার/প্লে করলে যা দেখাবে - অপশনাল)</label>
        <input type="text" class="input-viral" id="vGif" placeholder="GIF লিংক (যদি থাকে)">
        
        <label>আসল ভিডিওর লিংক (Direct Video বা Iframe URL)</label>
        <input type="text" class="input-viral" id="vLink" placeholder="যেমন: https://byse.sx/e/...">
        
        <div class="btn-group">
            <button class="btn-viral" id="btnSaveViral" onclick="saveData()"><i class="fas fa-upload"></i> ভিডিও পাবলিশ করুন</button>
            <button class="btn-cancel" id="btnCancelViral" onclick="cancelEdit()"><i class="fas fa-times"></i> বাতিল করুন</button>
        </div>

        <h3 style="margin-top: 30px; font-size: 16px;">🔥 আপলোড করা ভিডিও লিস্ট <span class="video-count count-viral" id="viralCounter">0 টি</span></h3>
        <div id="viralList"><p style="text-align:center; color:#7f8c8d;">লোড হচ্ছে...</p></div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAl0eRqOs5QNUg_J1Pj-4PlEqRDxAXr-oA",
        authDomain: "viral-zone-bd.firebaseapp.com",
        projectId: "viral-zone-bd",
        storageBucket: "viral-zone-bd.firebasestorage.app",
        messagingSenderId: "794737483555",
        appId: "1:794737483555:web:a275cd96aafff0e640f696",
        databaseURL: "https://viral-zone-bd-default-rtdb.firebaseio.com"
    };

    let db;
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    
    loadSettings(); 
    loadList();

    // --- Global Settings Save ---
    function saveAdSettings() {
        const adsgramId = document.getElementById('setAdsgramId').value.trim();
        const requiredAds = document.getElementById('setRequiredAds').value;
        const noticeText = document.getElementById('setNoticeText').value.trim();
        const bannerScript = document.getElementById('setBannerScript').value.trim();

        db.ref('siteConfig').update({
            adsgramId: adsgramId,
            requiredAds: parseInt(requiredAds) || 3,
            noticeText: noticeText,
            bannerScript: bannerScript
        }).then(() => alert("✅ গ্লোবাল সেটিংস সফলভাবে আপডেট হয়েছে!"));
    }

    // --- Global Settings Load ---
    function loadSettings() {
        db.ref('siteConfig').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('setAdsgramId').value = data.adsgramId || "";
                document.getElementById('setRequiredAds').value = data.requiredAds || 3;
                document.getElementById('setNoticeText').value = data.noticeText || "";
                document.getElementById('setBannerScript').value = data.bannerScript || "";
            }
        });
    }

    function saveData() {
        const key = document.getElementById('editKeyViral').value;
        const data = {
            title: document.getElementById('vTitle').value.trim(),
            thumb: document.getElementById('vThumb').value.trim(),
            gif: document.getElementById('vGif').value.trim() || "",
            link: document.getElementById('vLink').value.trim(),
            timestamp: Date.now()
        };

        if(!data.title || !data.thumb || !data.link) {
            return alert("⚠️ ভিডিওর টাইটেল, থাম্বনেইল এবং লিংক অবশ্যই দিতে হবে!");
        }

        if(key) {
            db.ref('bot_videos').child(key).update(data).then(() => {
                alert("✅ ভিডিও আপডেট হয়েছে!");
                cancelEdit();
            });
        } else {
            db.ref('bot_videos').push(data).then(() => {
                alert("✅ নতুন ভিডিও পাবলিশ হয়েছে!");
                cancelEdit();
            });
        }
    }

    function loadList() {
        db.ref('bot_videos').orderByChild('timestamp').on('value', (snap) => {
            const list = document.getElementById('viralList');
            let html = "";
            let count = 0;
            let itemsArray = [];

            snap.forEach(child => {
                itemsArray.push({ key: child.key, ...child.val() });
                count++;
            });
            
            itemsArray.reverse();
            document.getElementById('viralCounter').innerText = count + " টি আপলোড হয়েছে";

            if(count === 0) {
                list.innerHTML = `<p style='text-align:center; color:#7f8c8d; padding:20px;'>কোনো ভিডিও আপলোড করা হয়নি।</p>`;
                return;
            }

            itemsArray.forEach(item => {
                const cleanData = JSON.stringify(item).replace(/"/g, '&quot;');
                
                html += `
                <div class="video-item">
                    <div class="video-info">
                        <img src="${item.thumb}" onerror="this.src='https://via.placeholder.com/80x50?text=No+Image'">
                        <div class="video-details">
                            <h4>${item.title}</h4>
                            <p title="${item.link}">${item.link}</p>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-edit" onclick="editData('${cleanData}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteData('${item.key}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            });
            
            list.innerHTML = html;
        });
    }

    function editData(jsonString) {
        const data = JSON.parse(jsonString);
        
        document.getElementById('editKeyViral').value = data.key;
        document.getElementById('vTitle').value = data.title;
        document.getElementById('vThumb').value = data.thumb;
        document.getElementById('vGif').value = data.gif || '';
        document.getElementById('vLink').value = data.link;
        
        document.getElementById('formTitleViral').innerHTML = '<span style="color:#ff4757;"><i class="fas fa-edit"></i> ভিডিও এডিট করুন</span>';
        document.getElementById('btnSaveViral').innerHTML = '<i class="fas fa-sync"></i> আপডেট করুন';
        document.getElementById('btnCancelViral').style.display = "block";
        document.getElementById('formTitleViral').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
        document.getElementById('editKeyViral').value = "";
        document.getElementById('vTitle').value = "";
        document.getElementById('vThumb').value = "";
        document.getElementById('vGif').value = "";
        document.getElementById('vLink').value = "";
        
        document.getElementById('formTitleViral').innerHTML = '<span style="color:#ff4757;"><i class="fas fa-fire-alt"></i> ভাইরাল ভিডিও আপলোড</span>';
        document.getElementById('btnSaveViral').innerHTML = '<i class="fas fa-upload"></i> ভিডিও পাবলিশ করুন';
        document.getElementById('btnCancelViral').style.display = "none";
    }

    function deleteData(key) {
        if(confirm("আপনি কি নিশ্চিত যে এই ভিডিওটি ডিলিট করতে চান?")) {
            db.ref('bot_videos').child(key).remove();
        }
    }
</script>
</body>
</html>
